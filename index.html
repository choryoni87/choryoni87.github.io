<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>우리 가족 영상</title>
    <meta name="description" content="우리 가족이 올린 영상을 한 곳에 모았습니다." />
    <!-- 파비콘: favicon-master.png에서 32 / 64 / 180 생성 -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=20260503b" />
    <link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png?v=20260503b" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=20260503b" />
    <meta name="theme-color" content="#f97316" />
    <script>
      (function () {
        var KEY = "familySiteTheme";
        var html = document.documentElement;
        try {
          var s = localStorage.getItem(KEY);
          if (s === "light" || s === "dark") {
            html.setAttribute("data-theme", s);
          } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            html.setAttribute("data-theme", "dark");
          } else {
            html.setAttribute("data-theme", "light");
          }
        } catch (e) {
          html.setAttribute("data-theme", "light");
        }
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) {
          var dark = html.getAttribute("data-theme") === "dark";
          m.setAttribute("content", dark ? "#000000" : "#f97316");
        }
      })();
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="preconnect" href="https://www.youtube-nocookie.com" />
    <!-- ?v= 배포·수정 시 올리면 CSS/JS 캐시 무효화(웨딩 pill 등이 안 보일 때) -->
    <link rel="stylesheet" href="styles.css?v=20260504f" />
    <!-- 암호창: CSS가 늦게/실패해도 전체·중앙에 붙도록(구형 WebKit, 경로 이슈 대비) -->
    <style>
      /* 숨김 클래스(.site-gate--hidden)에 우선순위가 밀리지 않도록 :not으로 한정 */
      #site-gate:not(.site-gate--hidden) {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 1.5rem;
        padding: max(1.5rem, env(safe-area-inset-top, 0px)) max(1.5rem, env(safe-area-inset-right, 0px))
          max(1.5rem, env(safe-area-inset-bottom, 0px)) max(1.5rem, env(safe-area-inset-left, 0px));
        min-height: 100vh;
        background: rgba(32, 28, 24, 0.48);
      }
      /* 암호 통과 후엔 잠금 화면을 무조건 가림(인라인 스타일·외부 CSS 어느 쪽이든 이김) */
      #site-gate.site-gate--hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div
      id="site-gate"
      class="site-gate"
      role="dialog"
      aria-modal="true"
      aria-labelledby="gate-title"
    >
      <div class="site-gate__panel">
        <h2 id="gate-title" class="site-gate__title">가족 전용</h2>
        <p class="site-gate__lead">4자리 암호를 입력해 주세요.</p>
        <form id="gate-form" class="site-gate__form" data-gate-form novalidate>
          <label for="gate-pin" class="visually-hidden">4자리 숫자 암호</label>
          <input
            id="gate-pin"
            class="site-gate__input"
            type="text"
            name="pin"
            inputmode="numeric"
            maxlength="4"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            data-gate-input
          />
          <button type="submit" class="site-gate__btn">들어가기</button>
        </form>
        <p class="site-gate__err" data-gate-error hidden role="alert"></p>
      </div>
    </div>
    <header class="hero" aria-label="우리 가족 영상">
      <div class="hero__inner">
        <figure class="hero__photo">
          <div class="hero__photo-wrap">
            <span class="hero__photo-tape" aria-hidden="true"></span>
            <div class="hero__photo-frame">
              <img
                src="assets/hero-main.png"
                alt="가족 일러스트"
                width="800"
                height="800"
                loading="eager"
                decoding="async"
              />
            </div>
          </div>
        </figure>
        <div class="hero__text">
          <p class="hero__eyebrow">가족 아카이브</p>
          <h1 class="hero__title" data-site-title>우리 가족 영상</h1>
          <p class="hero__tagline" data-site-tagline>
            우리 가족의 추억이 머무는 영상, 늘 함께하길 바라요.
          </p>
          <p class="hero__hint">사랑하는 유미와 도유 ❤️</p>
        </div>
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          aria-label="다크 모드로 전환"
          title="다크 모드"
        >
          <span class="theme-toggle__gfx" aria-hidden="true">
            <svg
              class="theme-toggle__svg theme-toggle__svg--sun"
              viewBox="0 0 24 24"
              width="22"
              height="22"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="3.75" />
              <path
                d="M12 1.75v2M12 20.25v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1.75 12h2M20.25 12h2M5.64 18.36l-1.42 1.42M19.78 4.22l-1.42 1.42"
              />
            </svg>
            <svg
              class="theme-toggle__svg theme-toggle__svg--moon"
              viewBox="0 0 24 24"
              width="22"
              height="22"
              aria-hidden="true"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </span>
        </button>
      </div>
    </header>

    <main class="main">
      <section class="section" aria-labelledby="all-heading">
        <div class="section__head">
          <h2 id="all-heading" class="section__title">전체</h2>
          <div class="section__toolbar">
            <p class="section__sub" data-count></p>
            <div class="search">
              <label class="visually-hidden" for="video-search">영상 검색</label>
              <input
                id="video-search"
                class="search__input"
                type="search"
                placeholder="제목 및 단어 검색"
                autocomplete="off"
                data-search
              />
            </div>
          </div>
        </div>
        <div class="filters" data-filters aria-label="연도·분류"></div>
        <ul class="rows" data-list="all" aria-live="polite"></ul>
        <p class="empty" data-empty hidden>찾는 영상이 없어요. 다른 단어로 한 번 더 시도해 보세요.</p>
        <nav class="pager" data-pager aria-label="페이지" hidden></nav>
      </section>
    </main>

    <footer class="foot">
      <p>이 사이트는 가족용입니다. 링크 공유는 가족끼리만 ❤️</p>
    </footer>

    <template id="row-template">
      <li class="row">
        <button class="row__main" type="button" aria-expanded="false">
          <span class="row__thumb">
            <img alt="" loading="lazy" decoding="async" />
          </span>
          <span class="row__body">
            <span class="row__title"></span>
            <span class="row__meta">
              <time class="row__date"></time>
            </span>
            <span class="row__desc"></span>
          </span>
          <span class="row__chev" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M8 5l8 7-8 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
        <div class="row__player" hidden>
          <div class="row__player-inner"></div>
        </div>
      </li>
    </template>

    <script src="app.js?v=20260504f" type="module"></script>
  </body>
</html>
